<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Aanya Sharma | Culinary Artist & YouTube Chef</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --warm-orange: #E85D04;
            --deep-terracotta: #C1440E;
            --golden-amber: #F4A261;
            --saffron: #F7B538;
            --cream-bg: #FFF9F3;
            --warm-cream: #FFF3E6;
            --soft-peach: #FFEDE0;
            --warm-brown: #3E2723;
            --dark-espresso: #2C1810;
            --card-bg: #FFFFFF;
            --accent-gold: #D4A574;
            --rust: #B8431A;
            --coral-warm: #E8784A;
            --shadow-warm: 0 4px 20px rgba(184, 67, 26, 0.10);
            --shadow-card: 0 8px 32px rgba(184, 67, 26, 0.12);
            --shadow-hover: 0 16px 40px rgba(184, 67, 26, 0.18);
            --shadow-golden: 0 6px 24px rgba(244, 162, 97, 0.25);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-spring: 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: 80px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--cream-bg);
            color: var(--warm-brown);
            line-height: 1.7;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ============ NAVBAR ============ */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255, 249, 243, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(196, 130, 90, 0.15);
            padding: 0 2rem;
            transition: all var(--transition-smooth);
        }

        .navbar.scrolled {
            box-shadow: 0 2px 20px rgba(184, 67, 26, 0.10);
            background: rgba(255, 249, 243, 0.95);
        }

        .navbar-inner {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--dark-espresso);
            letter-spacing: -0.02em;
            transition: color var(--transition-smooth);
        }

        .nav-logo:hover {
            color: var(--warm-orange);
        }

        .nav-logo-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--warm-orange), var(--deep-terracotta));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #fff;
            box-shadow: var(--shadow-golden);
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--warm-brown);
            font-weight: 500;
            font-size: 0.95rem;
            transition: color var(--transition-smooth);
            position: relative;
            padding: 4px 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--warm-orange);
            border-radius: 4px;
            transition: width var(--transition-smooth);
        }

        .nav-links a:hover {
            color: var(--warm-orange);
        }
        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-cta {
            background: linear-gradient(135deg, var(--warm-orange), var(--deep-terracotta));
            color: #fff !important;
            padding: 10px 22px !important;
            border-radius: 50px;
            font-weight: 600 !important;
            font-size: 0.9rem !important;
            box-shadow: var(--shadow-golden);
            transition: all var(--transition-bounce) !important;
            text-decoration: none;
            white-space: nowrap;
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(232, 93, 4, 0.35);
            color: #fff !important;
        }
        .nav-cta::after {
            display: none !important;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            z-index: 1001;
        }

        .mobile-menu-btn span {
            display: block;
            width: 26px;
            height: 2.5px;
            background: var(--dark-espresso);
            margin: 6px 0;
            border-radius: 4px;
            transition: all var(--transition-smooth);
        }

        .mobile-menu-btn.open span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }
        .mobile-menu-btn.open span:nth-child(2) {
            opacity: 0;
        }
        .mobile-menu-btn.open span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        /* ============ HERO SECTION ============ */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 120px 2rem 80px;
            overflow: hidden;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(255, 180, 120, 0.35) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 60%, rgba(244, 162, 97, 0.30) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 80%, rgba(255, 200, 140, 0.25) 0%, transparent 50%),
                linear-gradient(180deg, #FFF9F3 0%, #FFF3E6 40%, #FFEDE0 100%);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -180px;
            right: -120px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(232, 93, 4, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -100px;
            left: -100px;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(244, 162, 97, 0.10) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .hero-content {
            max-width: 1300px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-text {
            animation: fadeInUp 0.9s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes floatSlow {
            0%,
            100% {
                transform: translateY(0px);
            }
            25% {
                transform: translateY(-12px);
            }
            50% {
                transform: translateY(-4px);
            }
            75% {
                transform: translateY(-16px);
            }
        }
        @keyframes pulseGlow {
            0%,
            100% {
                box-shadow: 0 6px 24px rgba(244, 162, 97, 0.25);
            }
            50% {
                box-shadow: 0 10px 36px rgba(232, 93, 4, 0.40);
            }
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(212, 165, 116, 0.4);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--deep-terracotta);
            margin-bottom: 1.5rem;
            backdrop-filter: blur(8px);
            letter-spacing: 0.01em;
        }

        .hero-badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--warm-orange);
            animation: pulseGlow 2s infinite;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.15;
            color: var(--dark-espresso);
            letter-spacing: -0.03em;
            margin-bottom: 1rem;
        }

        .hero h1 .highlight {
            background: linear-gradient(135deg, var(--warm-orange), var(--deep-terracotta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-tagline {
            font-size: 1.2rem;
            color: #6B4D3A;
            margin-bottom: 2rem;
            font-weight: 400;
            max-width: 480px;
            line-height: 1.6;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.35rem;
        }

        .hero-stats {
            display: flex;
            gap: 2.5rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .hero-stat {
            text-align: left;
        }
        .hero-stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--warm-orange);
            line-height: 1;
        }
        .hero-stat-label {
            font-size: 0.85rem;
            color: #7A5C4F;
            font-weight: 500;
            margin-top: 4px;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--warm-orange), var(--deep-terracotta));
            color: #fff;
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow-golden);
            transition: all var(--transition-bounce);
            letter-spacing: 0.01em;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(232, 93, 4, 0.4);
        }

        .btn-outline {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            color: var(--warm-orange);
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            border: 2px solid var(--warm-orange);
            cursor: pointer;
            transition: all var(--transition-bounce);
            letter-spacing: 0.01em;
        }
        .btn-outline:hover {
            background: rgba(232, 93, 4, 0.06);
            transform: translateY(-3px);
        }

        .hero-visual {
            position: relative;
            animation: fadeInRight 0.9s ease-out 0.2s both;
        }

        .hero-image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 500px;
            margin: 0 auto;
            border-radius: var(--radius-xl);
            background: linear-gradient(145deg, #FDE4D0, #FAD4B8, #F8C9A5);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-card);
            overflow: hidden;
            animation: floatSlow 7s ease-in-out infinite;
        }

        .hero-image-inner {
            text-align: center;
            padding: 2rem;
        }
        .hero-image-emoji {
            font-size: 7rem;
            display: block;
            margin-bottom: 1rem;
            filter: drop-shadow(0 8px 16px rgba(184, 67, 26, 0.2));
            animation: floatSlow 5s ease-in-out infinite;
        }
        .hero-image-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--deep-terracotta);
            letter-spacing: 0.02em;
        }

        .floating-recipe-card {
            position: absolute;
            background: #fff;
            border-radius: var(--radius-md);
            padding: 16px 20px;
            box-shadow: var(--shadow-card);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--warm-brown);
            animation: floatSlow 6s ease-in-out infinite;
            z-index: 2;
        }
        .floating-recipe-card.top-right {
            top: 5%;
            right: -10px;
            animation-delay: 1s;
        }
        .floating-recipe-card.bottom-left {
            bottom: 8%;
            left: -15px;
            animation-delay: 2.5s;
        }
        .floating-card-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--saffron), var(--golden-amber));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        /* ============ SECTION COMMONS ============ */
        .section {
            padding: 100px 2rem;
        }
        .section-inner {
            max-width: 1300px;
            margin: 0 auto;
        }
        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }
        .section-label {
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--warm-orange);
            margin-bottom: 0.75rem;
            background: rgba(232, 93, 4, 0.08);
            padding: 6px 16px;
            border-radius: 50px;
        }
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--dark-espresso);
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
        }
        .section-subtitle {
            font-size: 1.1rem;
            color: #7A5C4F;
            max-width: 600px;
            margin: 0 auto;
            font-weight: 400;
        }

        /* ============ SPECIAL RECIPES ============ */
        #special-recipes {
            background: linear-gradient(180deg, #FFF9F3 0%, #FFF1E6 40%, #FFEDE0 100%);
            position: relative;
        }
        #special-recipes::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 165, 116, 0.5), transparent);
        }

        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }

        .recipe-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: all var(--transition-spring);
            cursor: pointer;
            position: relative;
            border: 1px solid rgba(212, 165, 116, 0.2);
        }
        .recipe-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(232, 93, 4, 0.3);
        }

        .recipe-card-image {
            position: relative;
            height: 240px;
            overflow: hidden;
        }
        .recipe-card-img-bg {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            transition: transform var(--transition-spring);
        }
        .recipe-card:hover .recipe-card-img-bg {
            transform: scale(1.08);
        }
        .recipe-card-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: linear-gradient(135deg, #E85D04, #C1440E);
            color: #fff;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            box-shadow: 0 4px 14px rgba(232, 93, 4, 0.4);
            z-index: 2;
        }
        .recipe-card-difficulty {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(6px);
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--warm-brown);
            z-index: 2;
        }
        .recipe-card-body {
            padding: 1.5rem 1.5rem 1.8rem;
        }
        .recipe-card-body h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark-espresso);
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }
        .recipe-card-body p {
            font-size: 0.9rem;
            color: #7A5C4F;
            line-height: 1.5;
            margin-bottom: 1rem;
        }
        .recipe-card-meta {
            display: flex;
            gap: 1.2rem;
            font-size: 0.82rem;
            color: #8B6B5A;
            font-weight: 500;
            flex-wrap: wrap;
        }
        .recipe-card-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .recipe-card-footer {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(212, 165, 116, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .recipe-card-chef-note {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 0.9rem;
            color: var(--deep-terracotta);
            font-weight: 500;
        }
        .recipe-card-link {
            color: var(--warm-orange);
            font-weight: 600;
            font-size: 0.88rem;
            text-decoration: none;
            transition: color var(--transition-smooth);
        }
        .recipe-card-link:hover {
            color: var(--deep-terracotta);
        }

        /* ============ ABOUT SECTION ============ */
        #about {
            background: #fff;
        }
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 4rem;
            align-items: center;
        }
        .about-visual {
            position: relative;
        }
        .about-image-placeholder {
            width: 100%;
            aspect-ratio: 3/4;
            max-width: 420px;
            border-radius: var(--radius-xl);
            background: linear-gradient(160deg, #FDE0CD, #F5C5A3, #EDB88C);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
            font-size: 10rem;
            line-height: 1;
        }
        .about-accent-card {
            position: absolute;
            bottom: -25px;
            right: -25px;
            background: #fff;
            border-radius: var(--radius-md);
            padding: 18px 22px;
            box-shadow: var(--shadow-card);
            text-align: center;
            z-index: 2;
        }
        .about-accent-card .years {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--warm-orange);
            line-height: 1;
        }
        .about-accent-card .label {
            font-size: 0.8rem;
            color: #7A5C4F;
            font-weight: 500;
        }
        .about-text h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--dark-espresso);
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }
        .about-text .bio {
            font-size: 1.05rem;
            color: #5D4037;
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }
        .about-highlights {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .about-highlight-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            color: var(--warm-brown);
            font-size: 0.95rem;
        }
        .about-highlight-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(232, 93, 4, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        /* ============ VIDEO SECTION ============ */
        #videos {
            background: var(--warm-cream);
        }
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
        }
        .video-card {
            background: #fff;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: all var(--transition-spring);
            cursor: pointer;
            border: 1px solid rgba(212, 165, 116, 0.2);
        }
        .video-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
        }
        .video-thumb {
            position: relative;
            height: 190px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            transition: transform var(--transition-spring);
        }
        .video-card:hover .video-thumb {
            transform: scale(1.04);
        }
        .video-play-btn {
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            transition: all var(--transition-bounce);
        }
        .video-card:hover .video-play-btn {
            transform: scale(1.1);
            background: #fff;
        }
        .video-duration {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .video-card-body {
            padding: 1rem 1.2rem 1.3rem;
        }
        .video-card-body h4 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--dark-espresso);
            margin-bottom: 0.3rem;
        }
        .video-card-body .video-meta {
            font-size: 0.8rem;
            color: #8B6B5A;
            font-weight: 500;
        }

        /* ============ SOCIAL & NEWSLETTER ============ */
        #connect {
            background: linear-gradient(180deg, #fff 0%, #FFF9F3 100%);
        }
        .connect-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: start;
        }
        .social-links-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .social-link-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #fff;
            padding: 16px 20px;
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--warm-brown);
            font-weight: 500;
            box-shadow: var(--shadow-warm);
            transition: all var(--transition-bounce);
            border: 1px solid rgba(212, 165, 116, 0.2);
        }
        .social-link-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-card);
            border-color: var(--golden-amber);
        }
        .social-icon-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            color: #fff;
        }
        .social-info .platform {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .social-info .followers {
            font-size: 0.78rem;
            color: #8B6B5A;
        }

        .newsletter-box {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(212, 165, 116, 0.3);
            position: relative;
            overflow: hidden;
        }
        .newsletter-box::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(244, 162, 97, 0.2) 0%, transparent 70%);
            border-radius: 50%;
        }
        .newsletter-box h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--dark-espresso);
            margin-bottom: 0.5rem;
            position: relative;
        }
        .newsletter-box p {
            color: #7A5C4F;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            position: relative;
        }
        .newsletter-form {
            display: flex;
            gap: 0.75rem;
            position: relative;
        }
        .newsletter-form input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 50px;
            border: 2px solid rgba(212, 165, 116, 0.4);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color var(--transition-smooth);
            background: #FFFDFA;
        }
        .newsletter-form input:focus {
            border-color: var(--warm-orange);
            box-shadow: 0 0 0 4px rgba(232, 93, 4, 0.06);
        }
        .newsletter-form button {
            background: linear-gradient(135deg, var(--warm-orange), var(--deep-terracotta));
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: var(--shadow-golden);
            transition: all var(--transition-bounce);
            font-family: 'Inter', sans-serif;
        }
        .newsletter-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(232, 93, 4, 0.4);
        }

        /* ============ FOOTER ============ */
        .footer {
            background: var(--dark-espresso);
            color: #D4C4B8;
            padding: 50px 2rem 30px;
        }
        .footer-inner {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 1fr;
            gap: 3rem;
        }
        .footer-brand h3 {
            font-family: 'Playfair Display', serif;
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .footer-brand p {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #B8A494;
        }
        .footer-links h4 {
            color: #fff;
            font-weight: 600;
            margin-bottom: 1rem;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
        }
        .footer-links ul {
            list-style: none;
        }
        .footer-links ul li {
            margin-bottom: 0.6rem;
        }
        .footer-links ul li a {
            color: #B8A494;
            text-decoration: none;
            font-size: 0.88rem;
            transition: color var(--transition-smooth);
        }
        .footer-links ul li a:hover {
            color: var(--saffron);
        }
        .footer-bottom {
            max-width: 1300px;
            margin: 2rem auto 0;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            font-size: 0.85rem;
            color: #8B7B70;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 1024px) {
            .hero-content {
                grid-template-columns: 1fr;
                gap: 2.5rem;
                text-align: center;
            }
            .hero h1 {
                font-size: 2.8rem;
            }
            .hero-tagline {
                max-width: 100%;
            }
            .hero-stats {
                justify-content: center;
            }
            .hero-buttons {
                justify-content: center;
            }
            .hero-visual {
                order: -1;
            }
            .hero-image-wrapper {
                max-width: 320px;
            }
            .floating-recipe-card {
                display: none;
            }
            .about-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            .about-image-placeholder {
                max-width: 300px;
                margin: 0 auto;
            }
            .about-accent-card {
                right: 10px;
                bottom: -20px;
            }
            .connect-grid {
                grid-template-columns: 1fr;
            }
            .footer-inner {
                grid-template-columns: 1fr 1fr;
            }
            .section-title {
                font-size: 2.2rem;
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 280px;
                height: 100vh;
                background: #fff;
                flex-direction: column;
                padding: 100px 2rem 2rem;
                gap: 1.5rem;
                box-shadow: -4px 0 30px rgba(0, 0, 0, 0.1);
                transition: right var(--transition-smooth);
                z-index: 999;
            }
            .nav-links.open {
                right: 0;
            }
            .mobile-menu-btn {
                display: block;
            }
            .hero h1 {
                font-size: 2.2rem;
            }
            .hero-stats {
                gap: 1.5rem;
            }
            .hero-stat-number {
                font-size: 1.6rem;
            }
            .recipes-grid {
                grid-template-columns: 1fr;
            }
            .videos-grid {
                grid-template-columns: 1fr;
            }
            .social-links-grid {
                grid-template-columns: 1fr;
            }
            .newsletter-form {
                flex-direction: column;
            }
            .section {
                padding: 60px 1.2rem;
            }
            .section-title {
                font-size: 1.9rem;
            }
            .footer-inner {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            .about-highlights {
                grid-template-columns: 1fr;
            }
            .about-text h2 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .hero {
                padding: 100px 1rem 50px;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .hero-buttons {
                flex-direction: column;
                align-items: center;
            }
            .btn-primary,
            .btn-outline {
                width: 100%;
                justify-content: center;
            }
            .section-title {
                font-size: 1.6rem;
            }
            .navbar {
                padding: 0 1rem;
            }
        }

        /* ============ SCROLL ANIMATIONS ============ */
        .fade-in-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s ease-out, transform 0.7s ease-out;
        }
        .fade-in-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

        // ==================== COMPONENTS ====================

        // Navbar Component
        function Navbar() {
            const [scrolled, setScrolled] = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 30);
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const closeMobile = () => setMobileOpen(false);

            return (
                <nav className={`navbar ${scrolled ? 'scrolled' : ''}`}>
                    <div className="navbar-inner">
                        <a href="#" className="nav-logo">
                            <div className="nav-logo-icon">👩‍🍳</div>
                            Chef Aanya
                        </a>
                        <ul className={`nav-links ${mobileOpen ? 'open' : ''}`}>
                            <li><a href="#special-recipes" onClick={closeMobile}>Special Recipes</a></li>
                            <li><a href="#about" onClick={closeMobile}>About</a></li>
                            <li><a href="#videos" onClick={closeMobile}>Videos</a></li>
                            <li><a href="#connect" onClick={closeMobile}>Connect</a></li>
                            <li><a href="#connect" className="nav-cta" onClick={closeMobile}>Get Recipes →</a></li>
                        </ul>
                        <button
                            className={`mobile-menu-btn ${mobileOpen ? 'open' : ''}`}
                            onClick={() => setMobileOpen(!mobileOpen)}
                            aria-label="Toggle menu"
                        >
                            <span></span><span></span><span></span>
                        </button>
                    </div>
                </nav>
            );
        }

                            <div className="about-text">

                                <p className="bio">{chefData.bio}</p>
                                <div className="about-highlights">
                                    {chefData.awards.map((award, i) => (

        // Video Section
        function VideoSection() {
            return (
                <section className="section" id="videos">
                    <div className="section-inner">
                        <div className="section-header">
                            <span className="section-label">🎬 Latest from the Kitchen</span>

                                Step-by-step cooking videos that make every recipe approachable and fun.

                        <div className="videos-grid">
                            {videoData.map((video) => (
                                <div className="video-card" key={video.id}>
                                    <div className="video-thumb" style={{ background: video.gradient }}>

                                    <div className="video-card-body">
                                        <h4>{video.title}</h4>
                                        <div className="video-meta">
                                            {video.views} views • {video.date}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        // Connect Section (Social + Newsletter)
        function ConnectSection() {
            const [email, setEmail] = useState('');
            const [subscribed, setSubscribed] = useState(false);

            const handleSubscribe = (e) => {
                e.preventDefault();
                if (email.trim()) {
                    setSubscribed(true);
                    setEmail('');
                    setTimeout(() => setSubscribed(false), 4000);
                }
            };

            return (
                <section className="section" id="connect">
                    <div className="section-inner">
                        <div className="section-header">
                            <span className="section-label">💌 Stay Connected</span>
                            <h2 className="section-title">Let's Keep in Touch</h2>
                            <p className="section-subtitle">
                                Follow me on social media for daily cooking inspiration, or subscribe to my newsletter for exclusive recipes.
                            </p>
                        </div>
                        <div className="connect-grid">
                            <div>
                                <h3 style={{ fontFamily: 'Playfair Display, serif', fontSize: '1.4rem', marginBottom: '1.2rem', color: 'var(--dark-espresso)' }}>
                                    📱 Follow Along
                                </h3>
                                <div className="social-links-grid">
                                    {chefData.socialLinks.map((social, i) => (
                                        <a
                                            key={i}
                                            href={social.url}
                                            className="social-link-card"
                                            target="_blank"
                                            rel="noopener noreferrer"
                                        >
                                            <div
                                                className="social-icon-circle"
                                                style={{ background: social.color }}
                                            >
                                                {social.icon}
                                            </div>
                                            <div className="social-info">
                                                <div className="platform">{social.platform}</div>
                                                <div className="followers">{social.followers}</div>
                                            </div>
                                        </a>
                                    ))}
                                </div>
                            </div>
                            <div className="newsletter-box">
                                <h3>📧 Exclusive Recipes Newsletter</h3>
                                <p>Join 500,000+ food lovers who receive my weekly recipes, cooking tips, and behind-the-scenes stories — straight to your inbox.</p>
                                {subscribed ? (
                                    <div style={{
                                        background: 'rgba(46, 125, 50, 0.1)',
                                        padding: '16px 20px',
                                        borderRadius: '12px',
                                        color: '#2E7D32',
                                        fontWeight: 600,
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '10px'
                                    }}>
                                        ✅ Welcome aboard! Check your inbox for a special recipe.
                                    </div>
                                ) : (
                                    <form className="newsletter-form" onSubmit={handleSubscribe}>
                                        <input
                                            type="email"
                                            placeholder="your@email.com"
                                            value={email}
                                            onChange={(e) => setEmail(e.target.value)}
                                            required
                                        />
                                        <button type="submit">Subscribe Free</button>
                                    </form>
                                )}
                                <p style={{ fontSize: '0.75rem', color: '#A89484', marginTop: '0.8rem' }}>
                                    ✨ No spam, just delicious recipes. Unsubscribe anytime.
                                </p>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        // Footer
        function Footer() {
            return (
                <footer className="footer">
                    <div className="footer-inner">
                        <div className="footer-brand">
                            <h3>👩‍🍳 Chef Aanya Sharma</h3>
                            <p>Bringing warmth, spice, and storytelling to kitchens worldwide. One recipe at a time.</p>
                        </div>
                        <div className="footer-links">
                            <h4>Explore</h4>
                            <ul>
                                <li><a href="#special-recipes">Special Recipes</a></li>
                                <li><a href="#about">About the Chef</a></li>
                                <li><a href="#videos">Video Library</a></li>
                                <li><a href="#connect">Newsletter</a></li>
                            </ul>
                        </div>
                        <div className="footer-links">
                            <h4>Connect</h4>
                            <ul>
                                <li><a href="#">YouTube</a></li>
                                <li><a href="#">Instagram</a></li>
                                <li><a href="#">Facebook</a></li>
                                <li><a href="#">Contact</a></li>
                            </ul>
                        </div>
                        <div className="footer-links">
                            <h4>More</h4>
                            <ul>
                                <li><a href="#">Cookbooks</a></li>
                                <li><a href="#">Workshops</a></li>
                                <li><a href="#">Press</a></li>
                                <li><a href="#">Privacy Policy</a></li>
                            </ul>
                        </div>
                    </div>
                    <div className="footer-bottom">
                        © {new Date().getFullYear()} Chef Aanya Sharma. Crafted with ❤️ and a pinch of saffron. All rights reserved.
                    </div>
                </footer>
            );
        }

        // ==================== MAIN APP ====================
        function App() {
            const observerRef = useRef(null);

            useEffect(() => {
                // Scroll-triggered fade-in animations
                const observerOptions = { threshold: 0.12, rootMargin: '0px 0px -40px 0px' };

                observerRef.current = new IntersectionObserver((entries) => {
                    entries.forEach((entry) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                        }
                    });
                }, observerOptions);

                const elements = document.querySelectorAll('.fade-in-on-scroll');
                elements.forEach((el) => observerRef.current?.observe(el));

                // Add fade-in classes to sections
                document.querySelectorAll('.recipe-card, .video-card, .social-link-card, .about-visual, .about-text, .newsletter-box').forEach((el) => {
                    el.classList.add('fade-in-on-scroll');
                    observerRef.current?.observe(el);
                });

                return () => observerRef.current?.disconnect();
            }, []);

            return (
                <div>
                    <Navbar />
                    <main>
                        <HeroSection />
                        <SpecialRecipesSection />
                        <AboutSection />
                        <VideoSection />
                        <ConnectSection />
                    </main>
                    <Footer />
                </div>
            );
        }

        // ==================== RENDER ====================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
